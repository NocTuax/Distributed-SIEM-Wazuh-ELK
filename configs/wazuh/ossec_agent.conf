<ossec_config>
  <client>
    <server>
      <address>192.168.1.18</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
  </client>

  <!-- File Integrity Monitoring -->
  <syscheck>
    <directories check_all="yes" report_changes="yes" realtime="yes" whodata="yes">/home,/root</directories>
  </syscheck>

  <!-- Log analysis -->
  <localfile>
    <location>/var/log/suricata/eve.json</location>
    <log_format>json</log_format>
  </localfile>
</ossec_config>
